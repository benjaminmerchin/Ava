<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
      #c { display: block; width: 100%; height: 100%; }
      #fallback { display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <img id="fallback" src="/ava-face.jpg" alt="Ava" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const canvas = document.getElementById("c");
      const fallback = document.getElementById("fallback");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(22, 1, 0.1, 100);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.2));
      const key = new THREE.DirectionalLight(0xffffff, 1.5); key.position.set(1, 2, 2); scene.add(key);
      const fill = new THREE.DirectionalLight(0x99aaff, 0.5); fill.position.set(-2, 1, 1); scene.add(fill);

      function resize() {
        const w = canvas.clientWidth || 360, h = canvas.clientHeight || 190;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener("resize", resize);

      let morphMeshes = [], headBone = null, root = null, speaking = false, muted = false;
      function setMorph(name, val) {
        for (const m of morphMeshes) {
          const i = m.morphTargetDictionary[name];
          if (i !== undefined) m.morphTargetInfluences[i] = val;
        }
      }

      new GLTFLoader().load(
        "/ava-avatar.glb",
        (gltf) => {
          root = gltf.scene;
          scene.add(root);
          root.traverse((o) => {
            if (o.isMesh && o.morphTargetDictionary) { o.frustumCulled = false; morphMeshes.push(o); }
            if (o.isBone && o.name === "Head") headBone = o;
          });
          root.updateWorldMatrix(true, true);
          const target = new THREE.Vector3();
          if (headBone) { headBone.getWorldPosition(target); target.y += 0.12; }
          else {
            const box = new THREE.Box3().setFromObject(root);
            const s = new THREE.Vector3(); box.getSize(s);
            target.set(0, box.max.y - s.y * 0.09, 0);
          }
          camera.position.set(target.x, target.y, target.z + 0.58);
          camera.lookAt(target.x, target.y, target.z);
          resize();
          fallback.style.display = "none";
        },
        undefined,
        () => { canvas.style.display = "none"; fallback.style.display = "block"; }
      );

      // idle: subtle sway + blink
      let nextBlink = 1.5, blinkStart = -1;
      function idle(t) {
        if (headBone) {
          headBone.rotation.y = Math.sin(t * 0.5) * 0.05;
          headBone.rotation.z = Math.sin(t * 0.4) * 0.02;
        }
        if (blinkStart < 0 && t > nextBlink) { blinkStart = t; nextBlink = t + 2 + Math.random() * 3.5; }
        if (blinkStart >= 0) {
          const p = (t - blinkStart) / 0.13;
          const v = p < 1 ? Math.sin(p * Math.PI) : 0;
          setMorph("eyeBlinkLeft", v); setMorph("eyeBlinkRight", v);
          if (p >= 1) blinkStart = -1;
        }
      }

      const VIS = ["viseme_aa", "viseme_E", "viseme_I", "viseme_O", "viseme_U"];
      function talk(t) {
        setMorph("jawOpen", 0.12 + (Math.sin(t * 14) * 0.5 + 0.5) * 0.45);
        VIS.forEach((v) => setMorph(v, 0));
        setMorph(VIS[Math.floor(t * 7) % VIS.length], 0.35 * (Math.sin(t * 9) * 0.5 + 0.5));
      }
      function closeMouth() { setMorph("jawOpen", 0); VIS.forEach((v) => setMorph(v, 0)); }

      function loop(ms) {
        requestAnimationFrame(loop);
        const t = ms * 0.001;
        if (root) { idle(t); speaking ? talk(t) : closeMouth(); }
        renderer.render(scene, camera);
      }
      requestAnimationFrame(loop);

      // ---- voice (browser TTS drives the mouth) ----
      function pickVoice() {
        const vs = window.speechSynthesis ? speechSynthesis.getVoices() : [];
        if (!vs.length) return null;
        const pref = ["samantha", "google us english", "microsoft aria", "microsoft jenny", "microsoft michelle", "karen", "tessa"];
        for (const p of pref) { const m = vs.find((v) => v.name.toLowerCase().includes(p)); if (m) return m; }
        const en = vs.filter((v) => /^en[-_]?us/i.test(v.lang));
        return en.find((v) => !v.localService) || en[0] || vs.find((v) => /^en/i.test(v.lang)) || vs[0];
      }
      function speak(text) {
        if (!text || muted || !window.speechSynthesis) return;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US"; u.rate = 1.0; u.pitch = 1.06;
        const v = pickVoice(); if (v) u.voice = v;
        u.onstart = () => { speaking = true; };
        u.onend = () => { speaking = false; };
        u.onerror = () => { speaking = false; };
        speechSynthesis.speak(u);
      }
      if (window.speechSynthesis) speechSynthesis.getVoices();

      window.addEventListener("message", (e) => {
        const d = e.data || {};
        if (d.ava === "speak") speak(d.text);
        else if (d.ava === "mute") { muted = !!d.value; if (muted) { speechSynthesis.cancel(); speaking = false; } }
      });
      try { parent.postMessage({ ava: "ready" }, "*"); } catch (_) {}
      resize();
    </script>
  </body>
</html>
